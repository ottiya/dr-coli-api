<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dr. Coli v2</title>

  <link rel="stylesheet" href="./v2.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- PIXI v7 (do not change version) -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js" defer></script>

  <!-- Load your game code ONCE -->
  <script src="./js/audio.js" defer></script>
  <script src="./js/v2.js" defer></script>
</head>

<body>
  <div id="app">
    <div id="viewport">

      <!-- Background -->
      <div id="bgLayer"></div>

      <!-- Character stage (Pixi canvas injected here) -->
      <div id="stageLayer"></div>

      <!-- UI -->
      <div id="uiLayer">

  <!-- START SCREEN -->
  <div id="startScreen" class="start-overlay">

    <div class="start-card">

      <div class="start-header">
        <div class="episode-badge">1</div>
        <h2>Episode 1: Hello Explorer!</h2>
        <p class="mission-preview">Collect ⭐⭐⭐⭐⭐</p>
        <p class="start-instructions">Choose a theme and enter your name!</p>
      </div>

      <div class="theme-grid">

        <div class="theme-tile selected" data-theme="puppies">
          <div class="theme-emoji">🐶</div>
          <div class="theme-label">Puppies</div>
          <div class="theme-check">✓</div>
        </div>

        <div class="theme-tile" data-theme="dino">
          <div class="theme-emoji">🦕</div>
          <div class="theme-label">Dino</div>
          <div class="theme-check">✓</div>
        </div>

        <div class="theme-tile" data-theme="airport">
          <div class="theme-emoji">✈️</div>
          <div class="theme-label">Airport</div>
          <div class="theme-check">✓</div>
        </div>

      </div>

      <div class="name-input">
        <label>Your name (optional)</label>
        <input id="kidName" type="text" placeholder="Type your name here">
        <small>You can change this anytime.</small>
      </div>

      <button id="startButton" class="start-btn">
        Start! ⭐⭐⭐⭐⭐
      </button>

    </div>

  </div>

        <!-- Dialogue -->
        <div id="dialogue" class="dialogue">
          <img src="/assets/ui/dialogue-bubble.png" alt="dialogue bubble">
          <p id="dialogueText"></p>
        </div>

        <!-- Mission / Stars -->
<div id="missionBar" class="mission-bar" aria-hidden="true">
  <div class="mission-row">
    <span class="mission-icon" aria-hidden="true">🐶</span>
    <div class="mission-stars" aria-hidden="true">
      <span class="star">☆</span>
      <span class="star">☆</span>
      <span class="star">☆</span>
      <span class="star">☆</span>
      <span class="star">☆</span>
    </div>
  </div>
  <div class="mission-text">Collect 5 stars to help Bori!</div>
</div>

        <!-- Emoji tray -->
        <div id="emojiTray" class="emoji-tray hidden" aria-hidden="true">
          <img src="/assets/ui/emoji-tray.png" alt="emoji tray">
          <button class="emoji-slot" data-idx="0" aria-label="choice 1"></button>
          <button class="emoji-slot" data-idx="1" aria-label="choice 2"></button>
          <button class="emoji-slot" data-idx="2" aria-label="choice 3"></button>
        </div>

        <!-- Mic -->
        <button id="micButton" class="mic hidden" aria-label="Speak">
          <img src="/assets/ui/mic-button.png" alt="mic">
        </button>

        <!-- FX -->
        <div id="fxLayer" class="fx-layer" aria-hidden="true"></div>

      </div>
    </div>
  </div>
</body>
</html>
