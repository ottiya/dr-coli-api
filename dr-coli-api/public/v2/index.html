<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dr. Coli — Episode One</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./v2.css" />
  </head>

  <body>
    <div id="app">
      <div id="viewport">
        <div id="bgLayer"></div>
        <div id="stageLayer"></div>

        <div id="uiLayer">
          <!-- Dialogue Bubble -->
          <div id="dialogue" class="dialogue">
            <img src="/assets/ui/dialogue-bubble.png" alt="" />
            <p id="dialogueText"></p>
          </div>

          <!-- Emoji Tray -->
          <div id="emojiTray" class="emoji-tray hidden" aria-hidden="true">
            <img src="/assets/ui/emoji-tray.png" alt="" />
            <button class="emoji-slot" data-idx="0" aria-label="Emoji option 1"></button>
            <button class="emoji-slot" data-idx="1" aria-label="Emoji option 2"></button>
            <button class="emoji-slot" data-idx="2" aria-label="Emoji option 3"></button>
          </div>

          <!-- Mic -->
          <button id="micButton" class="mic hidden" aria-label="Speak">
            <img src="/assets/ui/mic-button.png" alt="" />
          </button>

          <!-- FX -->
          <div id="fxLayer" class="fx-layer" aria-hidden="true"></div>
        </div>

      </div>
    </div>

    <script src="./v2.js"></script>
  </body>
</html>
